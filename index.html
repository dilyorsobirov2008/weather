<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#050d1a;
  --glass:rgba(255,255,255,0.06);
  --glass-b:rgba(255,255,255,0.12);
  --glass-h:rgba(255,255,255,0.1);
  --blue:#4f9fff;
  --violet:#a78bfa;
  --cyan:#22d3ee;
  --rose:#fb7185;
  --txt:#f0f4ff;
  --txt2:rgba(240,244,255,0.55);
  --txt3:rgba(240,244,255,0.3);
  --r:24px;
  --rm:16px;
  --t:0.35s cubic-bezier(0.4,0,0.2,1);
}

[theme="light"] {
  --bg:#dce8f5;
  --glass:rgba(255,255,255,0.55);
  --glass-b:rgba(100,160,255,0.2);
  --glass-h:rgba(255,255,255,0.75);
  --txt:#12203a;
  --txt2:rgba(18,32,58,0.6);
  --txt3:rgba(18,32,58,0.35);
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--glass-b);border-radius:99px}

.weatherAll__parent {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  transition:background var(--t),color var(--t);
  position:relative;
  overflow-x:hidden;
}

.weatherAll__parent::before {
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%,rgba(79,159,255,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%,rgba(167,139,250,0.15) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(34,211,238,0.06) 0%,transparent 70%);
  pointer-events:none;z-index:0;
  animation:aurora 12s ease-in-out infinite alternate;
}
[theme="light"] .weatherAll__parent::before {
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,rgba(79,159,255,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%,rgba(167,139,250,0.1) 0%,transparent 60%);
}
@keyframes aurora{0%{opacity:1;transform:scale(1)}100%{opacity:0.8;transform:scale(1.05)}}

.weather,.sectionOne,.location,.deogramma{position:relative;z-index:1}
.contaiiner{max-width:1200px;margin:0 auto;padding:0 24px}

/* ── NAV ── */
.weather{
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-b);
  background:rgba(5,13,26,0.5);
  position:sticky;top:0;z-index:100;
}
[theme="light"] .weather{background:rgba(220,232,245,0.75)}

.weather__nav{display:flex;align-items:center;gap:16px;padding:16px 0;flex-wrap:wrap}

.weather__tit{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(1.1rem,3vw,1.5rem);
  background:linear-gradient(135deg,var(--blue),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;flex-shrink:0;
}

.weather__form{flex:1;max-width:400px;position:relative}
.weather__inp{
  width:100%;background:var(--glass);border:1px solid var(--glass-b);
  border-radius:99px;padding:11px 20px 11px 44px;color:var(--txt);
  font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;
  transition:var(--t);
}
.weather__inp::placeholder{color:var(--txt3)}
.weather__inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,159,255,0.15)}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;pointer-events:none;opacity:0.5;
}

/* Theme toggle */
.weather__logo--parent{margin-left:auto;display:flex;align-items:center}
#theme-toggle{display:none}
label[for="theme-toggle"]{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:99px;padding:5px 8px;cursor:pointer;
  transition:var(--t);position:relative;width:72px;height:36px;
}
label[for="theme-toggle"]:hover{background:var(--glass-h);border-color:var(--blue)}
label[for="theme-toggle"]::after{
  content:'';position:absolute;
  width:26px;height:26px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  border-radius:50%;top:4px;left:5px;
  transition:var(--t);
  box-shadow:0 2px 8px rgba(251,191,36,0.5);
}
#theme-toggle:checked + label[for="theme-toggle"]::after{
  transform:translateX(35px);
  background:linear-gradient(135deg,var(--blue),var(--violet));
  box-shadow:0 2px 8px rgba(79,159,255,0.4);
}
.weather__sun,.weather__moon{
  width:15px;height:15px;object-fit:contain;
  position:absolute;z-index:1;filter:brightness(0) invert(1);opacity:0.8;
}
.weather__sun{left:10px}
.weather__moon{right:10px}

/* ── LOADING STATE ── */
.loading-overlay{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;transition:opacity 0.4s;
}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner{
  width:48px;height:48px;border-radius:50%;
  border:3px solid var(--glass-b);
  border-top-color:var(--blue);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{color:var(--txt2);font-size:0.9rem;letter-spacing:0.05em}

/* ── ERROR STATE ── */
.error-msg{
  background:rgba(251,113,133,0.1);border:1px solid rgba(251,113,133,0.3);
  border-radius:var(--rm);padding:16px 20px;
  color:var(--rose);font-size:0.9rem;text-align:center;
  display:none;margin-top:16px;
}
.error-msg.show{display:block}

/* ── HERO ── */
.sectionOne{padding:40px 0 28px}
.sectionOne__body{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);padding:36px 44px;
  display:flex;align-items:center;justify-content:space-between;gap:28px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 0 40px rgba(79,159,255,0.2),inset 0 1px 0 rgba(255,255,255,0.08);
  flex-wrap:wrap;position:relative;overflow:hidden;
  animation:fadeUp 0.6s ease both;
}
.sectionOne__body::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(79,159,255,0.1),transparent 70%);
  pointer-events:none;
}

.sectionOne__left{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sectionOne__img{
  width:80px;height:80px;object-fit:contain;
  filter:drop-shadow(0 4px 16px rgba(79,159,255,0.4));
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.sectionOne__gradus{
  font-family:'Syne',sans-serif;
  font-size:clamp(3rem,8vw,5.5rem);font-weight:800;letter-spacing:-0.04em;line-height:1;
  background:linear-gradient(135deg,#fff 30%,var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
[theme="light"] .sectionOne__gradus{
  background:linear-gradient(135deg,#12203a 30%,var(--blue));
  -webkit-background-clip:text;background-clip:text;
}

.sectionOne__location{display:flex;flex-direction:column;gap:4px}
.sectionOne__country{font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue)}
.sectionOne__direction{font-size:1.3rem;font-family:'Syne',sans-serif;font-weight:700}

.sectionOne__Right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.sectionOne__time{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;letter-spacing:-0.02em}
.sectionOne__inner{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.sectionOne__days{font-size:0.75rem;color:var(--violet);letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
.sectionOne__day{font-family:'Syne',sans-serif;font-size:1rem;font-weight:600;color:var(--txt2)}

/* ── MAP ── */
.location{padding:20px 0}
.map-wrap{
  border-radius:var(--r);overflow:hidden;
  border:1px solid var(--glass-b);
  box-shadow:0 0 40px rgba(167,139,250,0.15);
  animation:fadeUp 0.6s 0.12s ease both;
}
#loacion__src{
  width:100%;height:300px;display:block;
  filter:saturate(0.7) hue-rotate(10deg);border:none;
  transition:filter var(--t);
}
#loacion__src:hover{filter:saturate(1) hue-rotate(0deg)}

/* ── DEOGRAMMA ── */
.deogramma{padding:20px 0 56px}
.deogramma__parent{display:grid;grid-template-columns:1fr 1.4fr;gap:20px;align-items:start}
@media(max-width:860px){.deogramma__parent{grid-template-columns:1fr}}

.deogramma__parentLeft{display:flex;flex-direction:column;gap:20px}

/* Stats card */
.deogramma__left{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);padding:24px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(79,159,255,0.15);
  display:flex;flex-direction:column;gap:16px;
  animation:fadeUp 0.6s 0.2s ease both;
}

.deogramma__sun{display:flex;align-items:stretch;gap:0}
.deogramma__sun--left{flex:1;padding-right:16px}
.sun__left--inner{display:flex;flex-direction:column;gap:12px}
.deogramma__span{width:1px;background:var(--glass-b);flex-shrink:0}
.deogramma__sun--right{flex:1;padding-left:16px}
.sun__right--inner{display:flex;flex-direction:column;gap:12px}
.sun__left--innerTwo{display:flex;flex-direction:column}

.left__two,.right__two{
  display:flex;align-items:center;gap:10px;
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--rm);padding:12px;
  transition:var(--t);flex:1;
}
.left__two:hover,.right__two:hover{
  background:var(--glass-h);border-color:var(--blue);
  transform:translateY(-2px);box-shadow:0 8px 20px rgba(79,159,255,0.1);
}
.left__two svg,.right__two svg{flex-shrink:0}
.humidty{display:flex;flex-direction:column;gap:2px}
.sun__text{font-size:0.68rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--txt3);font-weight:600}
.sun__res,.sun__resTwo,.sun__set,.sun__rise{
  font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;
  color:var(--txt);letter-spacing:-0.01em;
}
.sun__resTwo{color:var(--rose)}
.sun__set{color:var(--violet)}
.sun__rise{color:var(--blue)}

/* Wind card */
.arrow__scedchule{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);padding:22px 24px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(167,139,250,0.15);
  animation:fadeUp 0.6s 0.3s ease both;
  position:relative;overflow:hidden;
}
.arrow__scedchule::before{
  content:'';position:absolute;bottom:-30px;left:-30px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(34,211,238,0.08),transparent 70%);
  pointer-events:none;
}
.wrapper{display:flex;align-items:center;justify-content:space-between;gap:20px}
.arrow__left{display:flex;flex-direction:column;gap:8px}

.wind-label{font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt3);font-weight:600}
.arroew__left--tit{
  font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-0.02em;line-height:1;
}
.wind-icon-svg{
  width:36px;height:36px;
  filter:drop-shadow(0 2px 10px rgba(34,211,238,0.5));
}

.arrow__right{display:flex;justify-content:center}
.arrow_wood--parent{
  width:84px;height:84px;border-radius:50%;
  background:conic-gradient(from 0deg, rgba(79,159,255,0.15), rgba(167,139,250,0.15), rgba(34,211,238,0.15), rgba(79,159,255,0.15));
  border:2px solid var(--glass-b);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(79,159,255,0.18), inset 0 0 12px rgba(34,211,238,0.06);
  transition:var(--t);position:relative;
}
.arrow_wood--parent::before{
  content:'';position:absolute;inset:6px;border-radius:50%;
  border:1px dashed rgba(255,255,255,0.08);
}
.arrow_wood--parent:hover{border-color:var(--cyan);box-shadow:0 0 32px rgba(34,211,238,0.3)}
.arrow__img{
  width:36px;height:36px;object-fit:contain;
  filter:drop-shadow(0 0 6px rgba(79,159,255,0.5)) brightness(1.5);
  transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* Chart */
.deogramma__right{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);padding:24px 20px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(79,159,255,0.15);
  min-height:300px;
  animation:fadeUp 0.6s 0.25s ease both;
}
.deogramma__right canvas{max-width:100%!important;width:100%!important}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  .sectionOne__body{padding:24px 20px}
  .weather__nav{gap:10px}
}
@media(max-width:480px){
  .sectionOne__left{flex-direction:column;align-items:flex-start}
  .sectionOne__Right{align-items:flex-start;text-align:left}
  .deogramma__sun{flex-direction:column;gap:12px}
  .deogramma__span{display:none}
  .deogramma__sun--left,.deogramma__sun--right{padding:0}
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_KEY = '644f6ce0ca9e401ebb891832211707';
let chartInstance = null;

// DOM refs
const $loading     = document.getElementById('loadingOverlay');
const $errorMsg    = document.getElementById('errorMsg');
const $temp        = document.getElementById('tempDisplay');
const $country     = document.getElementById('countryDisplay');
const $city        = document.getElementById('cityDisplay');
const $icon        = document.getElementById('weatherIcon');
const $sunsetTime  = document.getElementById('sunsetTimeDisplay');
const $date        = document.getElementById('dateDisplay');
const $humidity    = document.getElementById('humidityDisplay');
const $uv          = document.getElementById('uvDisplay');
const $sunset      = document.getElementById('sunsetDisplay');
const $sunrise     = document.getElementById('sunriseDisplay');
const $windSpeed   = document.getElementById('windSpeedDisplay');
const $windArrow   = document.getElementById('windArrow');
const $mapFrame    = document.getElementById('loacion__src');
const $form        = document.getElementById('searchForm');
const $input       = document.getElementById('cityInput');
const $toggle      = document.getElementById('theme-toggle');
const $body        = document.querySelector('.weatherAll__parent');
const $chartWrap   = document.getElementById('chartContainer');

function renderData(data) {
  const day = data.forecast.forecastday[0];
  const cur = data.current;
  const loc = data.location;

  $temp.innerText        = cur.temp_c + '°';
  $country.innerText     = loc.country;
  $city.innerText        = loc.name;
  $icon.src              = 'https:' + cur.condition.icon;
  $humidity.innerText    = cur.humidity + '%';
  $uv.innerText          = cur.uv + ' / 10';
  $sunrise.innerText     = day.astro.sunrise;
  $sunset.innerText      = day.astro.sunset;
  $sunsetTime.innerText  = day.astro.sunset;
  $date.innerText        = day.date;
  $windSpeed.innerText   = cur.wind_kph + ' km/h';
  $windArrow.style.transform = `rotate(${cur.wind_degree}deg)`;
  $mapFrame.src = `https://maps.google.com/maps?q=${loc.lat},${loc.lon}&z=12&output=embed`;

  renderChart(data);
}

function renderChart(data) {
  // Destroy old chart before creating new
  if (chartInstance) {
    chartInstance.destroy();
    chartInstance = null;
  }

  const canvas = document.createElement('canvas');
  canvas.id = 'myChart';
  $chartWrap.innerHTML = '';
  $chartWrap.appendChild(canvas);

  const hours  = data.forecast.forecastday[0].hour.map(h => h.time.split(' ')[1]);
  const temps  = data.forecast.forecastday[0].hour.map(h => h.temp_c);
  const isDark = $body.getAttribute('theme') !== 'light';
  const tickColor = isDark ? 'rgba(240,244,255,0.45)' : 'rgba(18,32,58,0.45)';
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(18,32,58,0.06)';

  let delayed = false;
  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels: hours,
      datasets: [{
        label: `Temperature in ${data.location.name} (°C)`,
        data: temps,
        borderColor: '#a78bfa',
        borderWidth: 2.5,
        backgroundColor: 'rgba(167,139,250,0.08)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#4f9fff',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      animation: {
        onComplete: () => { delayed = true; },
        delay: (ctx) => {
          if (ctx.type === 'data' && ctx.mode === 'default' && !delayed)
            return ctx.dataIndex * 200 + ctx.datasetIndex * 80;
          return 0;
        }
      },
      plugins: {
        legend: {
          labels: { color: tickColor, font: { family: 'DM Sans', size: 12 } }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: tickColor, font: { size: 11 }, maxRotation: 0, maxTicksLimit: 12 },
          border: { color: gridColor }
        },
        y: {
          beginAtZero: false,
          grid: { color: gridColor },
          ticks: { color: tickColor, font: { size: 11 } },
          border: { color: gridColor }
        }
      }
    }
  });
}

async function loadWeather(city) {
  $loading.classList.remove('hidden');
  $errorMsg.classList.remove('show');
  try {
    const res = await fetch(
      `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${encodeURIComponent(city)}&days=1&aqi=yes&alerts=yes`
    );
    if (!res.ok) throw new Error('City not found');
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    renderData(data);
  } catch (err) {
    $errorMsg.innerText = err.message || 'Something went wrong. Try again.';
    $errorMsg.classList.add('show');
    console.error(err);
  } finally {
    $loading.classList.add('hidden');
  }
}

// Search
$form.addEventListener('submit', (e) => {
  e.preventDefault();
  const val = $input.value.trim();
  if (val) loadWeather(val);
});

// Theme
function applyTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  $body.setAttribute('theme', saved);
  $toggle.checked = (saved === 'dark');
}
$toggle.addEventListener('change', () => {
  const theme = $toggle.checked ? 'dark' : 'light';
  localStorage.setItem('theme', theme);
  $body.setAttribute('theme', theme);
  // Re-render chart with correct colors if data exists
  if (chartInstance) {
    const labels = chartInstance.data.labels;
    const temps  = chartInstance.data.datasets[0].data;
    const cityName = $city.innerText;
    const isDark = theme !== 'light';
    const tickColor = isDark ? 'rgba(240,244,255,0.45)' : 'rgba(18,32,58,0.45)';
    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(18,32,58,0.06)';
    chartInstance.options.plugins.legend.labels.color = tickColor;
    chartInstance.options.scales.x.ticks.color = tickColor;
    chartInstance.options.scales.y.ticks.color = tickColor;
    chartInstance.options.scales.y.grid.color = gridColor;
    chartInstance.update();
  }
});

applyTheme();
loadWeather('Andijan');
</script>

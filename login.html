<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Login Sahifasi</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eceff1; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="text-align: center;">Kirish</h2>
    <input type="text" id="username" placeholder="Username (masalan: emilys)">
    <input type="password" id="password" placeholder="Parol">
    <button onclick="handleLogin()">Tizimga kirish</button>
</div>

<script>
    function handleLogin() {
        const userVal = document.getElementById('username').value;
        const passVal = document.getElementById('password').value;
        if (!passVal) {
            alert("Parolni kiriting!");
            return;
        }
        fetch('https://dummyjson.com/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: userVal,
                password: passVal,
            })
        })
        .then(res => {
            if (!res.ok) throw new Error("Login yoki parol xato!");
            return res.json();
        })
        .then(data => {
            localStorage.setItem('accessToken', data.token);
            window.location.href = 'index.html'; 
        })
        .catch(err => alert(err.message));
    }
</script>

</body>
</html>
